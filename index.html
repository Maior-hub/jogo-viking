<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Viking Game</title>

<style>
/* ===== BASE ===== */
body {
    margin: 0;
    background: #1e1e1e;
    color: white;
    font-family: monospace;
}

/* ===== TELAS ===== */
.screen {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* ===== MENU INFERIOR ===== */
.menu {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #222;
    display: flex;
}

.menu button {
    flex: 1;
    padding: 15px;
    background: #333;
    color: white;
    border: none;
}

.menu button:hover {
    background: #555;
}

/* ===== EQUIPAMENTO ===== */
.char {
    display: grid;
    grid-template-columns: 60px 100px 60px;
    gap: 5px;
}

.slot {
    width: 60px;
    height: 60px;
    background: #111;
    border: 2px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
}

.player {
    font-size: 40px;
}

/* SLOT EQUIPADO */
.equipped {
    border: 2px solid lime !important;
}

/* TOOLTIP */
.tooltip {
    position: absolute;
    background: black;
    padding: 5px;
    border: 1px solid white;
    font-size: 12px;
    pointer-events: none;
    display: none;
}
</style>
</head>

<body>

<!-- ===== MUNDO ===== -->
<div id="mundo" class="screen active">
    <h2>🌍 Mundo</h2>
    <button onclick="openScreen('masmorra')">🕳️ Masmorra</button>
    <button onclick="openScreen('ferreiro')">🔨 Ferreiro</button>
    <button onclick="openScreen('fazenda')">🌾 Fazenda</button>
    <button onclick="openScreen('arena')">⚔️ Arena</button>
</div>

<!-- ===== MASMORRA ===== -->
<div id="masmorra" class="screen">
    <h2>🕳️ Masmorra</h2>
    <button onclick="dropItem()">Lutar</button>
</div>

<!-- ===== OUTRAS TELAS ===== -->
<div id="ferreiro" class="screen"><h2>🔨 Ferreiro</h2></div>
<div id="fazenda" class="screen"><h2>🌾 Fazenda</h2></div>
<div id="arena" class="screen"><h2>⚔️ Arena</h2></div>

<!-- ===== PERSONAGEM ===== -->
<div id="character" class="screen">
    <h2>👤 Personagem</h2>

    <div class="char">
        <div class="slot" id="helmet">🪖</div>
        <div class="player">🧍</div>
        <div class="slot" id="weapon">🗡️</div>

        <div class="slot" id="chest">🛡️</div>
        <div></div>
        <div class="slot" id="legs">👖</div>

        <div class="slot" id="boots">👢</div>
    </div>

    <p>ATK: <span id="atk">1</span></p>
</div>

<!-- ===== INVENTÁRIO ===== -->
<div id="inventario" class="screen">
    <h2>🎒 Inventário</h2>
    <div id="inventory"></div>
</div>

<!-- ===== MENU ===== -->
<div class="menu">
    <button onclick="openScreen('mundo')">🌍</button>
    <button onclick="openScreen('character')">👤</button>
    <button onclick="openScreen('inventario')">🎒</button>
</div>

<!-- TOOLTIP -->
<div id="tooltip" class="tooltip"></div>

<script>

/* =========================
   NAVEGAÇÃO ENTRE TELAS
========================= */
function openScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* =========================
   PLAYER
========================= */
let player = {
    baseAtk: 1,
    weapon: null
};

let items = [];

/* =========================
   SISTEMA DE LOOT
========================= */
function randomRarity() {
    let r = Math.random();
    if (r < 0.5) return "Comum";
    if (r < 0.75) return "Raro";
    if (r < 0.9) return "Épico";
    return "Lendário";
}

function dropItem() {
    let item = {
        name: "Espada",
        icon: "🗡️",
        atk: Math.floor(Math.random() * 5) + 1,
        raridade: randomRarity(),
        slot: "weapon"
    };

    items.push(item);
    renderInventory();
}

/* =========================
   INVENTÁRIO
========================= */
function renderInventory() {
    let inv = document.getElementById("inventory");
    inv.innerHTML = "";

    items.forEach(item => {
        let div = document.createElement("div");

        div.innerText = item.icon;
        div.style.border = "1px solid white";
        div.style.display = "inline-block";
        div.style.padding = "10px";
        div.style.margin = "5px";

        // botão direito = equipar
        div.oncontextmenu = (e) => {
            e.preventDefault();
            equip(item);
        };

        // tooltip
        div.onmouseover = (e) => showTooltip(e, item);
        div.onmousemove = moveTooltip;
        div.onmouseout = hideTooltip;

        inv.appendChild(div);
    });
}

/* =========================
   EQUIPAR / DESEQUIPAR
========================= */
function equip(item) {
    if (item.slot === "weapon") {
        player.weapon = item;

        let slot = document.getElementById("weapon");
        slot.innerText = item.icon;
        slot.classList.add("equipped");
    }

    updateStats();
}

function unequip(slot) {
    player.weapon = null;

    let el = document.getElementById(slot);
    el.innerText = "🗡️";
    el.classList.remove("equipped");

    updateStats();
}

/* =========================
   STATS
========================= */
function updateStats() {
    let atk = player.baseAtk;

    if (player.weapon) {
        atk += player.weapon.atk;
    }

    document.getElementById("atk").innerText = atk;
}

/* =========================
   TOOLTIP
========================= */
function showTooltip(e, item) {
    let tooltip = document.getElementById("tooltip");

    tooltip.innerHTML = `
        <b>${item.name}</b><br>
        ATK: ${item.atk}<br>
        Raridade: ${item.raridade}
    `;

    tooltip.style.display = "block";
}

function moveTooltip(e) {
    let tooltip = document.getElementById("tooltip");
    tooltip.style.left = e.pageX + 10 + "px";
    tooltip.style.top = e.pageY + 10 + "px";
}

function hideTooltip() {
    document.getElementById("tooltip").style.display = "none";
}

/* =========================
   EVENTOS (IMPORTANTE)
========================= */
window.onload = () => {
    // botão direito no slot = desequipar
    document.getElementById("weapon").oncontextmenu = (e) => {
        e.preventDefault();
        unequip("weapon");
    };
};

</script>

</body>
</html>
